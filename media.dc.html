<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: oklch(0.985 0.004 95); }
    a { color: inherit; }
    @media (max-width: 640px) {
      .jl-nav-links { gap: 16px !important; font-size: 13px !important; flex-wrap: wrap; justify-content: flex-end; }
    }
  
    .jl-nav-toggle { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
    .jl-menu-btn { display: none; }
    @media (max-width: 640px) {
      .jl-navbar { align-items: center !important; padding-left: 22px !important; padding-right: 18px !important; }
      .jl-menu-btn { display: inline-flex; align-items: center; justify-content: center; width: 46px; height: 46px; margin: -12px -8px -12px 0; font-size: 24px; line-height: 1; color: oklch(0.3 0.012 250); cursor: pointer; -webkit-tap-highlight-color: transparent; }
      .jl-nav-links { display: none !important; position: absolute; top: calc(100% + 1px); left: 0; right: 0; flex-direction: column !important; align-items: stretch !important; gap: 0 !important; background: oklch(0.985 0.004 95); border-bottom: 1px solid oklch(0.88 0.008 250); box-shadow: 0 10px 26px oklch(0.3 0.03 250 / 0.10); padding: 6px 0 10px !important; z-index: 50; font-size: 16px !important; }
      .jl-nav-toggle:checked ~ .jl-nav-links { display: flex !important; }
      .jl-nav-links a { padding: 14px 24px !important; display: block; }
      main { padding-left: 22px !important; padding-right: 22px !important; }
    }
</style>
</helmet>
<div style="font-family: 'Public Sans', system-ui, sans-serif; color: oklch(0.26 0.012 250); background: oklch(0.985 0.004 95); min-height: 100vh; -webkit-font-smoothing: antialiased;">

  <nav style="border-bottom: 1px solid oklch(0.9 0.008 250); background: oklch(0.985 0.004 95); position: sticky; top: 0; z-index: 10;">
    <div class="jl-navbar" style="max-width: 880px; margin: 0 auto; padding: 22px 32px; display: flex; align-items: baseline; justify-content: space-between; gap: 24px; position: relative;">
      <a href="home.dc.html" style="font-family: 'Newsreader', serif; font-size: 20px; text-decoration: none; color: oklch(0.26 0.012 250);">Joyce J.Y. Lin</a>
      <input type="checkbox" id="jl-nav-toggle" class="jl-nav-toggle"><label for="jl-nav-toggle" class="jl-menu-btn" aria-label="Open menu">☰</label><div class="jl-nav-links" style="display: flex; gap: 26px; font-size: 14px;">
        <a href="publications.dc.html" style="text-decoration: none; color: oklch(0.4 0.012 250);">Publications</a>
        <a href="talks.dc.html" style="text-decoration: none; color: oklch(0.4 0.012 250);">Talks</a>
        <a href="media.dc.html" style="text-decoration: none; color: oklch(0.24 0.012 250); font-weight: 600;">Media</a>
        <a href="teaching.dc.html" style="text-decoration: none; color: oklch(0.4 0.012 250);">Teaching</a>
        <a href="cv.dc.html" style="text-decoration: none; color: oklch(0.4 0.012 250);">CV</a>
        <a href="contact.dc.html" style="text-decoration: none; color: oklch(0.4 0.012 250);">Contact</a>
      </div>
    </div>
  </nav>

  <main style="max-width: 880px; margin: 0 auto; padding: 64px 32px 40px;">
    <h1 style="font-family: 'Newsreader', serif; font-weight: 400; font-size: 42px; letter-spacing: -0.01em; margin: 0 0 18px;">Media & Research Highlights</h1>
    <p style="font-size: 15.5px; line-height: 1.7; color: oklch(0.42 0.012 250); margin: 0 0 24px; max-width: 62ch;">Selected press coverage and institutional features of my research.</p>

    <div style="display: grid; gap: 20px;">
      <sc-for list="{{ items }}" as="m" hint-placeholder-count="3">
        <article style="border: 1px solid oklch(0.9 0.008 250); border-radius: 4px; padding: 28px 30px; background: oklch(0.995 0.003 95);">
          <div style="font-size: 12px; letter-spacing: 0.13em; text-transform: uppercase; color: oklch(0.55 0.06 200); font-weight: 600; margin-bottom: 10px;">{{ m.year }}</div>
          <h2 style="font-family: 'Newsreader', serif; font-weight: 400; font-size: 24px; line-height: 1.25; letter-spacing: -0.005em; color: oklch(0.22 0.012 250); margin: 0 0 18px; text-wrap: pretty;">{{ m.headline }}</h2>
          <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px;">
            <sc-for list="{{ m.outlets }}" as="o" hint-placeholder-count="3">
              <a href="{{ o.href }}" target="_blank" rel="noopener" style="font-size: 13px; color: oklch(0.4 0.045 200); border: 1px solid oklch(0.85 0.02 200); border-radius: 999px; padding: 5px 13px; background: oklch(0.985 0.004 95); text-decoration: none; display: inline-flex; align-items: center; gap: 5px;" style-hover="background: oklch(0.955 0.012 200); border-color: oklch(0.72 0.04 200);">{{ o.name }} ↗</a>
            </sc-for>
          </div>
          <a href="{{ m.href }}" style="font-size: 14px; color: oklch(0.5 0.07 200); text-decoration: none;">Read the study →</a>
        </article>
      </sc-for>
    </div>
  </main>

  <footer style="border-top: 1px solid oklch(0.9 0.008 250); margin-top: 48px;">
    <div style="max-width: 880px; margin: 0 auto; padding: 34px 32px 48px;">
      <div style="display: flex; flex-wrap: wrap; gap: 8px 22px; font-size: 14px; margin-bottom: 18px;">
        <a href="https://scholar.google.com/citations?user=ovjAFaQAAAAJ&hl=en&oi=ao" style="text-decoration: none; color: oklch(0.4 0.012 250);">Google Scholar</a>
        <a href="https://orcid.org/0000-0001-8382-1020" style="text-decoration: none; color: oklch(0.4 0.012 250);">ORCID</a>
        <a href="https://hsph.harvard.edu/profile/joyce-lin/" style="text-decoration: none; color: oklch(0.4 0.012 250);">Harvard Profile</a>
        <a href="https://www.linkedin.com/in/jlin/" style="text-decoration: none; color: oklch(0.4 0.012 250);">LinkedIn</a>
        <a href="https://github.com/joyce-jy-lin" style="text-decoration: none; color: oklch(0.4 0.012 250);">GitHub</a>
        <a href="mailto:jlin1@hsph.harvard.edu" style="text-decoration: none; color: oklch(0.4 0.012 250);">Email</a>
      </div>
      <div style="font-size: 13px; color: oklch(0.6 0.012 250);">© Joyce J.Y. Lin</div>
    </div>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:760}}">
class Component extends DCLogic {
  renderVals() {
    return {
      items: [
        {
          year: "2026",
          headline: "Prenatal lead exposure associated with later-life cognitive function",
          outlets: [
            { name: "Harvard T.H. Chan School of Public Health News", href: "https://hsph.harvard.edu/news/prenatal-lead-exposure-associated-with-worse-cognitive-function-in-adulthood/" },
            { name: "American Academy of Neurology Press Release", href: "https://www.aan.com/PressRoom/home/PressRelease/5313" },

          ],
          href: "https://pubmed.ncbi.nlm.nih.gov/41707109/"
        },
        {
          year: "2025",
          headline: "Prenatal lead exposure linked with increased risk of adult depression",

            { name: "Medscape", href: "https://www.medscape.com/viewarticle/prenatal-lead-exposure-tied-significant-risk-major-2025a1000u3q" }

            { name: "U.S. News & World Report", href: "https://www.usnews.com/news/health-news/articles/2025-07-17/living-near-polluted-missouri-creek-as-a-child-tied-to-later-cancer-risk" },

}
</script>
</body>
</html>
